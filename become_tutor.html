<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Tutor - TutorPoint</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #fde7f3 0%, #fff0f8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .reg-container {
            background: white;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(193, 53, 132, 0.15);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            color: #8e164d;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .profile-upload-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .upload-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px dashed #c13584;
            display: inline-block;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            background: #f9f9f9;
        }

        .upload-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .upload-circle i {
            font-size: 40px;
            color: #c13584;
            line-height: 120px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #c13584;
            box-shadow: 0 0 5px rgba(193, 53, 132, 0.2);
        }

        .btn-container {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .submit-btn {
            flex: 2;
            background: linear-gradient(135deg, #ff5ca8, #c13584);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-btn {
            flex: 1;
            background: #eee;
            color: #333;
            text-decoration: none;
            text-align: center;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(193, 53, 132, 0.3);
        }
        
        small {
            color: #666;
            font-size: 12px;
            display: block;
            margin-top: 5px;
        }
        
        .experience-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .experience-group input {
            flex: 2;
        }
        
        .experience-group select {
            flex: 1;
        }

        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .phone-input-container {
            position: relative;
        }

        #regPhone {
            padding-left: 45px;
        }
    </style>
</head>

<body>
    <div class="reg-container">
        <div class="header">
            <h2>📚 Tutor Registration</h2>
            <p>আপনার তথ্য দিয়ে টিউটর একাউন্ট তৈরি করুন</p>
        </div>

        <div class="profile-upload-section">
            <div class="upload-circle" onclick="document.getElementById('imageInput').click()">
                <i class="fas fa-camera" id="cameraIcon"></i>
                <img id="imagePreview" src="" alt="Preview">
            </div>
            <input type="file" id="imageInput" hidden accept="image/*">
            <p style="font-size: 12px; color: #c13584; margin-top: 5px;">
                <i class="fas fa-cloud-upload-alt"></i> Upload Profile Picture (Optional)
            </p>
        </div>

        <form id="tutorRegisterForm">
            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="regName" placeholder="e.g. Rakib Hasan" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number *</label>
                    <div class="phone-input-container">
                        <input type="tel" id="regPhone" placeholder="017XXXXXXXX" required pattern="01[3-9][0-9]{8}" title="Please enter a valid Bangladeshi phone number (11 digits starting with 01)">
                    </div>
                    <small class="phone-hint">Example: 01712345678 (11 digits)</small>
                    <div class="error-message" id="phoneError">Please enter a valid Bangladeshi phone number (11 digits starting with 01)</div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address *</label>
                    <input type="email" id="regEmail" placeholder="example@mail.com" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password *</label>
                    <input type="password" id="regPassword" placeholder="Enter password" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-graduation-cap"></i> Education Level *</label>
                    <input type="text" id="regEdu" placeholder="e.g. BSc / Honours" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-venus-mars"></i> Gender</label>
                    <select id="regGender">
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-book"></i> Subjects You Can Teach *</label>
                <input type="text" id="regSubject" placeholder="e.g. Math, Physics, Chemistry, Bangla" required>
                <small>Separate multiple subjects with commas</small>
            </div>

            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Preferred Tuition Area *</label>
                <input type="text" id="regArea" placeholder="e.g. Mirpur, Dhaka" required>
            </div>

            <div class="form-group">
                <label>⏳ Teaching Experience *</label>
                <div class="experience-group">
                    <input type="number" id="regExperienceValue" step="0.1" min="0" value="2.5" placeholder="Experience" required>
                    <select id="regExperienceUnit">
                        <option value="years">Years</option>
                        <option value="months">Months</option>
                    </select>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-money-bill"></i> Expected Salary (Tk/Month)</label>
                    <input type="text" id="regSalary" placeholder="e.g. 9000">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Preferred Time</label>
                    <select id="regTime">
                        <option value="">Select Time</option>
                        <option>Morning</option>
                        <option>Afternoon</option>
                        <option>Evening</option>
                        <option>Weekend</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-chalkboard"></i> Preferred Class</label>
                <textarea id="regClass" placeholder="e.g. Class 6, Class 7, HSC 1st Year"></textarea>
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-language"></i> Medium of Instruction</label>
                    <select id="regMedium">
                        <option value="">Select Medium</option>
                        <option>Bangla Medium</option>
                        <option>English Medium</option>
                        <option>Both</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-users"></i> Tuition Style</label>
                    <select id="regStyle">
                        <option value="">Select Style</option>
                        <option>Private Tuition</option>
                        <option>Group Tuition</option>
                        <option>Online Tuition</option>
                        <option>All</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-id-card"></i> NID Number *</label>
                <input type="text" id="regNid" placeholder="e.g. 7644****" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-address-card"></i> About Yourself</label>
                <textarea id="regAbout" placeholder="Tell students about your teaching style..."></textarea>
            </div>

            <div class="btn-container">
                <a href="home.html" class="back-btn">Back</a>
                <button type="submit" class="submit-btn">Submit Application</button>
            </div>
        </form>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAkUHxzVA6SxcTeheoytoWUAiuTKADWBQw",
            authDomain: "medialert-a04d5.firebaseapp.com",
            projectId: "medialert-a04d5",
            storageBucket: "medialert-a04d5.firebasestorage.app",
            messagingSenderId: "267657249954",
            appId: "1:267657249954:web:01165929839cb83e7e03fb"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        console.log("Firebase initialized successfully");

        let selectedFile = null;
        const DEFAULT_PROFILE_IMG = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

        // Phone number validation function for Bangladesh
        function validateBangladeshPhone(phone) {
            // Remove any non-digit characters
            const cleaned = phone.replace(/\D/g, '');
            
            // Check if it's a valid Bangladeshi number
            // Valid formats: 01XXXXXXXXX (11 digits starting with 01)
            const bdPhoneRegex = /^01[3-9][0-9]{8}$/;
            return bdPhoneRegex.test(cleaned);
        }

        // Format phone number (remove non-digits)
        function formatPhoneNumber(phone) {
            return phone.replace(/\D/g, '');
        }

        // Image Preview
        document.getElementById('imageInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function (event) {
                    document.getElementById('imagePreview').src = event.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('cameraIcon').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // Real-time phone number validation
        const phoneInput = document.getElementById('regPhone');
        const phoneError = document.getElementById('phoneError');

        phoneInput.addEventListener('input', function() {
            const phone = this.value;
            if (phone.length > 0) {
                if (!validateBangladeshPhone(phone)) {
                    this.style.borderColor = '#dc3545';
                    phoneError.style.display = 'block';
                } else {
                    this.style.borderColor = '#28a745';
                    phoneError.style.display = 'none';
                }
            } else {
                this.style.borderColor = '#ddd';
                phoneError.style.display = 'none';
            }
        });

        // Handle form submission
        document.getElementById('tutorRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            console.log("Form submitted");

            // Get phone number and validate
            const phoneNumber = document.getElementById('regPhone').value;
            
            if (!validateBangladeshPhone(phoneNumber)) {
                alert("❌ দয়া করে একটি বৈধ বাংলাদেশী মোবাইল নম্বর দিন (যেমন: 01712345678)");
                document.getElementById('regPhone').focus();
                return;
            }

            // Show loading state
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            submitBtn.disabled = true;

            try {
                // Format phone number (remove non-digits)
                const formattedPhone = formatPhoneNumber(phoneNumber);

                // Get experience value and unit
                const expValue = document.getElementById('regExperienceValue').value;
                const expUnit = document.getElementById('regExperienceUnit').value;
                const experienceText = `${expValue} ${expUnit}`;

                // Get all form values
                const formData = {
                    name: document.getElementById('regName').value.trim(),
                    phone: formattedPhone, // Save formatted phone number
                    email: document.getElementById('regEmail').value.trim(),
                    password: document.getElementById('regPassword').value,
                    qualification: document.getElementById('regEdu').value,
                    gender: document.getElementById('regGender').value || 'Male',
                    subject: document.getElementById('regSubject').value.toLowerCase().trim(),
                    area: document.getElementById('regArea').value.toLowerCase().trim(),
                    experience: experienceText,
                    salary: document.getElementById('regSalary').value.trim() || 'Negotiable',
                    preferredClass: document.getElementById('regClass').value.trim() || 'Not specified',
                    preferredTime: document.getElementById('regTime').value || 'Flexible',
                    medium: document.getElementById('regMedium').value || 'Bangla Medium',
                    tuitionStyle: document.getElementById('regStyle').value || 'Private Tuition',
                    nid: document.getElementById('regNid').value.trim(),
                    about: document.getElementById('regAbout').value.trim() || 'Experienced tutor dedicated to helping students achieve their academic goals.',
                    createdAt: new Date().toISOString(),
                    userType: 'tutor',
                    role: 'tutor',
                    averageRating: 4.5,
                    reviewCount: 0,
                    status: 'active',
                    country: 'Bangladesh',
                    phoneCountry: 'BD'
                };

                console.log("Form data collected:", formData);

                // Validate required fields
                if (!formData.name || !formData.phone || !formData.email || !formData.password || !formData.qualification || !formData.subject || !formData.area || !formData.nid) {
                    throw new Error("Please fill all required fields");
                }

                // Handle profile picture
                let profilePicUrl = DEFAULT_PROFILE_IMG;

                if (selectedFile) {
                    try {
                        // Convert to base64
                        const reader = new FileReader();
                        const base64Promise = new Promise((resolve, reject) => {
                            reader.onload = () => resolve(reader.result);
                            reader.onerror = reject;
                        });
                        reader.readAsDataURL(selectedFile);
                        const base64Image = await base64Promise;
                        
                        // Upload to Firebase Storage
                        const fileName = `tutor_${Date.now()}_${selectedFile.name}`;
                        const storageRef = ref(storage, `tutor_profiles/${fileName}`);
                        
                        await uploadString(storageRef, base64Image, 'data_url');
                        profilePicUrl = await getDownloadURL(storageRef);
                        
                        console.log("Profile picture uploaded successfully");
                    } catch (uploadError) {
                        console.error("Error uploading image:", uploadError);
                        // Continue with default image if upload fails
                    }
                }

                formData.profilePic = profilePicUrl;
                formData.hasCustomPhoto = selectedFile ? true : false;

                // Save to Firestore
                console.log("Saving to Firestore...");
                const docRef = await addDoc(collection(db, "tutors"), formData);
                console.log("Document written with ID: ", docRef.id);

                // Save to localStorage for auto-login
                localStorage.setItem("userLoggedIn", "true");
                localStorage.setItem("userType", "tutor");
                localStorage.setItem("userDocId", docRef.id);
                localStorage.setItem("userName", formData.name);
                localStorage.setItem("userEmail", formData.email);
                localStorage.setItem("userPhone", formData.phone);
                localStorage.setItem("userImg", formData.profilePic);
                localStorage.setItem("userRole", "tutor");

                alert("✅ আপনার টিউটর একাউন্ট সফলভাবে তৈরি হয়েছে! আপনি এখন লগইন করেছেন।");
                
                // Redirect to home page
                window.location.href = "home.html";

            } catch (error) {
                console.error("Error details:", error);
                alert("❌ একটি সমস্যা হয়েছে: " + error.message);
                
                // Reset button
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
