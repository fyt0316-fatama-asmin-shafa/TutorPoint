<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuition Apply</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background: linear-gradient(180deg, #fde7f3 0%, #fff0f8 100%);
font-family:system-ui;
padding:2rem;
display:flex;
justify-content:center;
}
.container{max-width:1300px;width:100%}

.page-nav{
display:flex;gap:1rem;
margin-bottom:2rem;
background:white;
padding:0.8rem 1.5rem;
border-radius:60px;
}
.page-btn{
border:none;
background:transparent;
padding:0.6rem 2rem;
border-radius:40px;
cursor:pointer;
font-weight:500;
}
.page-btn.active{background:#8e164d;color:white}

.page{display:none}
.active-page{display:block}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:1.5rem;
}

.card{
background:white;padding:1.5rem;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.20);
display:flex;flex-direction:column;
transition:0.3s;
}
.card:hover{transform:translateY(-5px)}

.detail-row{
display:flex;justify-content:space-between;
margin-bottom:0.5rem;font-size:0.9rem;
}
.value{
background:#f0f5fb;
padding:0.2rem 0.8rem;
border-radius:40px;
}

.salary{
background:#e3f0ec;
padding:0.2rem 1rem;
border-radius:40px;
}

.apply-btn{
margin-top:1rem;
padding:0.7rem;
border:none;border-radius:40px;
background: linear-gradient(135deg, #ff5ca8, #c13584);
color:white;
cursor:pointer;
}
.apply-btn.applied{
background:#d1acbd;
cursor:not-allowed;
}

.popup{
position:fixed;inset:0;
background:rgba(0,0,0,0.5);
display:flex;justify-content:center;align-items:center;
visibility:hidden;opacity:0;transition:0.2s;
}
.popup.active{visibility:visible;opacity:1}

.popup-card{
background:white;padding:2rem;border-radius:25px;width:340px;
}
.popup-buttons{
display:flex;gap:1rem;margin-top:1rem;
}
.popup-buttons button{
flex:1;padding:0.6rem;border-radius:30px;border:none;cursor:pointer;
}
.confirm{background:#1f3449;color:white}
.cancel{background:#eee}

.applied-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:1.5rem;
}

.dashboard-card{
background:white;padding:1.5rem;
border-radius:20px;
border-left:5px solid #56738f;
position:relative;
}
.remove-btn{
margin-top:0.8rem;
background:#fbe4e4;
border:none;padding:5px 12px;
border-radius:20px;cursor:pointer;
}

#search{
margin-bottom:1.5rem;
padding:0.7rem 1rem;
border-radius:40px;
border:1px solid #ccc;
width:250px;
}
</style>

</head>
<body>

<div class="container">

<div class="page-nav">
<button class="page-btn active" id="p1">Apply</button>
<button class="page-btn" id="p2">Dashboard</button>
</div>

<div class="page active-page" id="page1">
<input type="text" id="search" placeholder="Search by Class (6,7,8...)">
<div class="grid" id="grid"></div>
</div>

<div class="page" id="page2">
<div class="applied-list" id="dashboard"></div>
</div>

</div>

<div class="popup" id="popup">
<div class="popup-card">
<h3>Confirm Application</h3>
<div id="popupDetails"></div>
<div class="popup-buttons">
<button class="cancel" id="cancel">Cancel</button>
<button class="confirm" id="confirm">Confirm</button>
</div>
</div>
</div>

<script type="module">
// ========== FIREBASE IMPORTS ==========
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, where, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// ========== FIREBASE CONFIG ==========
const firebaseConfig = {
    apiKey: "AIzaSyAkUHxzVA6SxcTeheoytoWUAiuTKADWBQw",
    authDomain: "medialert-a04d5.firebaseapp.com",
    projectId: "medialert-a04d5",
    storageBucket: "medialert-a04d5.firebasestorage.app",
    messagingSenderId: "267657249954",
    appId: "1:267657249954:web:01165929839cb83e7e03fb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ========== GLOBAL VARIABLES ==========
const isLoggedIn = localStorage.getItem("userLoggedIn") === "true";
const userType = localStorage.getItem("userType");
const userDocId = localStorage.getItem("userDocId");
const userEmail = localStorage.getItem("userEmail");
const userName = localStorage.getItem("userName");

let appliedPostIds = new Set(); // Store applied post IDs
let tuitionData = [];
let currentPostId = null;
let applications = []; // Store full application data

// ========== SAMPLE DATA (IF FIRESTORE EMPTY) ==========
const sampleData = [
{
id:"RMP-1001",
classNum:"6",
medium:"Bangla",
location:"Rampura",
subjects:["Math"]
},
{
id:"UTR-1002",
classNum:"8",
medium:"English",
location:"Uttara",
subjects:["Math","English","Science"]
},
{
id:"GLS-1003",
classNum:"9",
medium:"English",
location:"Gulshan",
subjects:["Physics","Chemistry"]
},
{
id:"DHM-1004",
classNum:"10",
medium:"Bangla",
location:"Dhanmondi",
subjects:["Math","Higher Math","ICT","Physics"]
},
{
id:"MRP-1005",
classNum:"7",
medium:"Bangla",
location:"Mirpur",
subjects:["English"]
},
{
id:"BDD-1006",
classNum:"6",
medium:"English",
location:"Badda",
subjects:["Math","English"]
},
{
id:"BAN-1007",
classNum:"9",
medium:"English",
location:"Banani",
subjects:["Physics","Chemistry","Biology"]
},
{
id:"MHK-1008",
classNum:"10",
medium:"Bangla",
location:"Mohakhali",
subjects:["Math","ICT"]
},
{
id:"WAR-1009",
classNum:"8",
medium:"Bangla",
location:"Wari",
subjects:["Math"]
},
{
id:"MTJ-1010",
classNum:"7",
medium:"English",
location:"Motijheel",
subjects:["English","Math","Science"]
}
];

// ========== LOAD TUITION POSTS ==========
async function loadTuitionPosts() {
    try {
        const postsRef = collection(db, "tuitionPosts");
        const q = query(postsRef, orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        
        if (!snapshot.empty) {
            tuitionData = [];
            snapshot.forEach(doc => {
                tuitionData.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
        } else {
            tuitionData = sampleData;
        }
        
        // Load applications for this tutor
        if (isLoggedIn && userType === "tutor") {
            await loadApplications();
        } else {
            render();
        }
    } catch (error) {
        console.error("Error loading posts:", error);
        tuitionData = sampleData;
        render();
    }
}

// ========== LOAD APPLICATIONS FROM FIRESTORE ==========
async function loadApplications() {
    try {
        const appsRef = collection(db, "applications");
        const q = query(appsRef, where("tutorId", "==", userDocId));
        const snapshot = await getDocs(q);
        
        // Clear existing data
        appliedPostIds.clear();
        applications = [];
        
        snapshot.forEach(doc => {
            const app = { id: doc.id, ...doc.data() };
            applications.push(app);
            appliedPostIds.add(app.postId);
        });
        
        render();
        renderDashboard();
    } catch (error) {
        console.error("Error loading applications:", error);
        render();
    }
}

// ========== CALCULATE SALARY ==========
function calculateSalary(subjects) {
    return subjects.length * 1000;
}

// ========== RENDER FUNCTION ==========
function render() {
    const grid = document.getElementById("grid");
    
    if (!isLoggedIn) {
        grid.innerHTML = tuitionData.map((item) => {
            const salary = item.salary || calculateSalary(item.subjects);
            return `
            <div class="card" data-id="${item.id}">
                <div class="detail-row">
                    <span>ID</span>
                    <span class="value">${item.id}</span>
                </div>
                <div class="detail-row">
                    <span>Class</span>
                    <span class="value">${item.classNum}</span>
                </div>
                <div class="detail-row">
                    <span>Medium</span>
                    <span class="value">${item.medium}</span>
                </div>
                <div class="detail-row">
                    <span>Location</span>
                    <span class="value">${item.location}</span>
                </div>
                <div class="detail-row">
                    <span>Subjects</span>
                    <span class="value">${item.subjects.join(", ")}</span>
                </div>
                <div class="detail-row">
                    <span>Salary</span>
                    <span class="salary">৳ ${salary}</span>
                </div>
                <button class="apply-btn" disabled>Login to Apply</button>
            </div>`;
        }).join("");
        return;
    }
    
    if (userType !== "tutor") {
        grid.innerHTML = tuitionData.map((item) => {
            const salary = item.salary || calculateSalary(item.subjects);
            return `
            <div class="card" data-id="${item.id}">
                <div class="detail-row">
                    <span>ID</span>
                    <span class="value">${item.id}</span>
                </div>
                <div class="detail-row">
                    <span>Class</span>
                    <span class="value">${item.classNum}</span>
                </div>
                <div class="detail-row">
                    <span>Medium</span>
                    <span class="value">${item.medium}</span>
                </div>
                <div class="detail-row">
                    <span>Location</span>
                    <span class="value">${item.location}</span>
                </div>
                <div class="detail-row">
                    <span>Subjects</span>
                    <span class="value">${item.subjects.join(", ")}</span>
                </div>
                <div class="detail-row">
                    <span>Salary</span>
                    <span class="salary">৳ ${salary}</span>
                </div>
                <button class="apply-btn" disabled>Only Tutors Can Apply</button>
            </div>`;
        }).join("");
        return;
    }
    
    grid.innerHTML = tuitionData.map((item) => {
        const isApplied = appliedPostIds.has(item.id);
        const salary = item.salary || calculateSalary(item.subjects);
        
        return `
        <div class="card" data-id="${item.id}">
            <div class="detail-row">
                <span>ID</span>
                <span class="value">${item.id}</span>
            </div>
            <div class="detail-row">
                <span>Class</span>
                <span class="value">${item.classNum}</span>
            </div>
            <div class="detail-row">
                <span>Medium</span>
                <span class="value">${item.medium}</span>
            </div>
            <div class="detail-row">
                <span>Location</span>
                <span class="value">${item.location}</span>
            </div>
            <div class="detail-row">
                <span>Subjects</span>
                <span class="value">${item.subjects.join(", ")}</span>
            </div>
            <div class="detail-row">
                <span>Salary</span>
                <span class="salary">৳ ${salary}</span>
            </div>
            <button class="apply-btn ${isApplied ? 'applied' : ''}" ${isApplied ? 'disabled' : ''}>
                ${isApplied ? 'Applied' : 'Apply'}
            </button>
        </div>`;
    }).join("");
    
    // Add click handlers to apply buttons
    document.querySelectorAll(".apply-btn:not(.applied)").forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const card = btn.closest(".card");
            if (card) {
                const postId = card.dataset.id;
                const post = tuitionData.find(p => p.id === postId);
                if (post) {
                    currentPostId = postId;
                    const salary = post.salary || calculateSalary(post.subjects);
                    
                    document.getElementById("popupDetails").innerHTML = `
                        <p><strong>ID:</strong> ${post.id}</p>
                        <p><strong>Class:</strong> ${post.classNum}</p>
                        <p><strong>Location:</strong> ${post.location}</p>
                        <p><strong>Subjects:</strong> ${post.subjects.join(", ")}</p>
                        <p><strong>Total Salary:</strong> ৳ ${salary}</p>`;
                    document.getElementById("popup").classList.add("active");
                }
            }
        };
    });
}

// ========== RENDER DASHBOARD ==========
function renderDashboard() {
    const dashboard = document.getElementById("dashboard");
    
    if (!isLoggedIn || userType !== "tutor" || applications.length === 0) {
        dashboard.innerHTML = "";
        return;
    }
    
    dashboard.innerHTML = applications.map(app => {
        const post = tuitionData.find(p => p.id === app.postId);
        if (!post) return '';
        
        const salary = post.salary || calculateSalary(post.subjects);
        const appliedDate = app.appliedAt ? new Date(app.appliedAt.toDate()).toLocaleDateString() : 'Recently';
        
        return `
        <div class="dashboard-card">
            <div><strong>ID:</strong> ${post.id}</div>
            <div>Class: ${post.classNum}</div>
            <div>Location: ${post.location}</div>
            <div>Subjects: ${post.subjects.join(", ")}</div>
            <div><strong>Salary: ৳ ${salary}</strong></div>
            <div style="font-size:0.8rem; color:#666;">Applied: ${appliedDate}</div>
            <button class="remove-btn" data-app-id="${app.id}" data-post-id="${post.id}">Remove</button>
        </div>`;
    }).join("");
}

// ========== CONFIRM BUTTON ==========
document.getElementById("confirm").onclick = async () => {
    if (!currentPostId) return;
    
    const post = tuitionData.find(p => p.id === currentPostId);
    if (!post) return;
    
    // Check if already applied
    if (appliedPostIds.has(currentPostId)) {
        alert("You have already applied for this post!");
        document.getElementById("popup").classList.remove("active");
        currentPostId = null;
        return;
    }
    
    const confirmBtn = document.getElementById("confirm");
    const originalText = confirmBtn.textContent;
    confirmBtn.textContent = "Submitting...";
    confirmBtn.disabled = true;
    
    try {
        const salary = post.salary || calculateSalary(post.subjects);
        
        // Save to Firestore
        const docRef = await addDoc(collection(db, "applications"), {
            postId: post.id,
            postDetails: {
                classNum: post.classNum,
                medium: post.medium,
                location: post.location,
                subjects: post.subjects,
                salary: salary
            },
            tutorId: userDocId,
            tutorName: userName || "Unknown",
            tutorEmail: userEmail,
            status: "pending",
            appliedAt: serverTimestamp()
        });
        
        // Update local state
        appliedPostIds.add(post.id);
        applications.push({
            id: docRef.id,
            postId: post.id,
            postDetails: {
                classNum: post.classNum,
                medium: post.medium,
                location: post.location,
                subjects: post.subjects,
                salary: salary
            },
            tutorId: userDocId,
            status: "pending"
        });
        
        // Close popup
        document.getElementById("popup").classList.remove("active");
        
        // Re-render
        render();
        renderDashboard();
        
        // Switch to dashboard
        document.getElementById("p2").click();
        
    } catch (error) {
        console.error("Error saving application:", error);
        alert("Error submitting application. Please try again.");
    } finally {
        confirmBtn.textContent = originalText;
        confirmBtn.disabled = false;
        currentPostId = null;
    }
};

// ========== CANCEL BUTTON ==========
document.getElementById("cancel").onclick = () => {
    document.getElementById("popup").classList.remove("active");
    currentPostId = null;
};

// ========== REMOVE BUTTON ==========
document.addEventListener("click", async (e) => {
    if (e.target.classList.contains("remove-btn")) {
        const appId = e.target.dataset.appId;
        const postId = e.target.dataset.postId;
        
        if (confirm("Are you sure you want to remove this application?")) {
            try {
                // Delete from Firestore
                await deleteDoc(doc(db, "applications", appId));
                
                // Update local state
                appliedPostIds.delete(postId);
                applications = applications.filter(app => app.id !== appId);
                
                // Re-render
                render();
                renderDashboard();
                
            } catch (error) {
                console.error("Error removing application:", error);
                alert("Error removing application. Please try again.");
            }
        }
    }
});

// ========== SEARCH ==========
document.getElementById("search").addEventListener("input", function() {
    const value = this.value;
    document.querySelectorAll(".card").forEach(card => {
        const classNum = card.querySelectorAll(".value")[1]?.innerText || "";
        card.style.display = classNum.includes(value) ? "flex" : "none";
    });
});

// ========== PAGE NAVIGATION ==========
document.getElementById("p1").onclick = () => {
    document.getElementById("page1").classList.add("active-page");
    document.getElementById("page2").classList.remove("active-page");
    document.getElementById("p1").classList.add("active");
    document.getElementById("p2").classList.remove("active");
};

document.getElementById("p2").onclick = () => {
    document.getElementById("page2").classList.add("active-page");
    document.getElementById("page1").classList.remove("active-page");
    document.getElementById("p2").classList.add("active");
    document.getElementById("p1").classList.remove("active");
    renderDashboard();
};

// ========== INITIALIZE ==========
loadTuitionPosts();

// Close popup when clicking outside
document.getElementById("popup").addEventListener("click", (e) => {
    if (e.target === document.getElementById("popup")) {
        document.getElementById("popup").classList.remove("active");
        currentPostId = null;
    }
});
</script>

</body>
</html>
